site_name: 美少女的成长之路
site_description: 专栏、学习库与我的笔记
site_url: https://jxh1997.github.io/
docs_dir: docs
site_dir: site
use_directory_urls: true
theme:
  name: material
  language: zh
  features:
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - navigation.indexes
  - navigation.instant
  - navigation.instant.progress
  - navigation.tracking
  - toc.follow
  - content.code.copy
  - content.tooltips
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: teal
    accent: deep orange
    toggle:
      icon: material/brightness-4
      name: 切换到深色模式
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: black
    accent: amber
    toggle:
      icon: material/brightness-7
      name: 切换到浅色模式
extra_css:
- assets/stylesheets/extra.css
extra_javascript:
- assets/javascripts/referrerpolicy.js
- assets/javascripts/reading-state.js
markdown_extensions:
- admonition
- tables
- attr_list
- md_in_html
- def_list
- pymdownx.details
- pymdownx.superfences
- pymdownx.inlinehilite
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.tabbed:
    alternate_style: true
plugins:
- search
